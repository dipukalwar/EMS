{% extends 'base.html' %}
{% block title %}Success — EventHive{% endblock %}

{% block content %}
<section class="container my-5">
  <div class="row justify-content-center">
    <div class="col-11 col-sm-8 col-md-6 col-lg-5 text-center">
      <div class="card auth-card p-4 p-md-5">
        <div class="mb-3">
          <i class="bi bi-check-circle-fill display-5 text-success"></i>
        </div>
        <h3 class="mb-2">Password Updated!</h3>
        <p class="text-muted mb-4">
          Your new password has been successfully saved. You can now use it to access your EventHive account.
        </p>
        <a href="{% url 'login' %}" class="btn btn-primary w-100">Log In Now</a>
      </div>
    </div>
  </div>
</section>
{% endblock %}
